<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vendor Pricing{% endblock %} — Creative Affairs Catering</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; background: #f4f5f7; color: #1a1a1a;
    }
    nav {
      background: #1a1a2e; color: white; padding: 0 24px;
      display: flex; align-items: center; gap: 32px; height: 56px;
    }
    nav .brand { font-weight: 700; font-size: 1.1em; color: #e8b94f; letter-spacing: .5px; }
    nav a { color: #ccc; text-decoration: none; font-size: .95em; padding: 6px 0; border-bottom: 2px solid transparent; }
    nav a:hover, nav a.active { color: white; border-bottom-color: #e8b94f; }
    main { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
    h1 { font-size: 1.6em; margin: 0 0 24px; color: #1a1a2e; }
    h2 { font-size: 1.2em; color: #333; margin: 24px 0 12px; }
    .card {
      background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 20px 24px; margin-bottom: 24px;
    }
    table { width: 100%; border-collapse: collapse; font-size: .92em; }
    th { background: #1a1a2e; color: white; padding: 8px 12px; text-align: left; font-weight: 600; }
    td { padding: 7px 12px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: .8em; font-weight: 600;
    }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-yellow { background: #fff3cd; color: #856404; }
    .badge-red { background: #f8d7da; color: #721c24; }
    .badge-gray { background: #e2e3e5; color: #383d41; }
    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 5px;
      font-size: .9em; font-weight: 600; cursor: pointer; border: none;
      text-decoration: none;
    }
    .btn-primary { background: #1a1a2e; color: white; }
    .btn-primary:hover { background: #2d2d50; }
    .btn-gold { background: #e8b94f; color: #1a1a2e; }
    .btn-gold:hover { background: #d4a53a; }
    input[type=text], input[type=number], select {
      padding: 8px 12px; border: 1px solid #ccc; border-radius: 5px;
      font-size: .95em; width: 100%; max-width: 400px;
    }
    .error-box { background: #f8d7da; color: #721c24; padding: 12px 16px; border-radius: 5px; margin-bottom: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .stat-box { text-align: center; padding: 16px; }
    .stat-box .num { font-size: 2em; font-weight: 700; color: #1a1a2e; }
    .stat-box .lbl { font-size: .85em; color: #666; margin-top: 4px; }
    @media (max-width: 700px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      nav { flex-wrap: wrap; height: auto; padding: 12px; gap: 12px; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="brand">Creative Affairs Catering</span>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
  <a href="/compare" {% if request.path == '/compare' %}class="active"{% endif %}>Compare</a>
  <a href="/vendors" {% if request.path == '/vendors' %}class="active"{% endif %}>Vendors</a>
  <a href="/report" {% if request.path == '/report' %}class="active"{% endif %}>Event Report</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
